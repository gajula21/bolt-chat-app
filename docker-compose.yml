version: '3.8'

services:
  # --- Database ---
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- Redis (Message Broker) ---
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  # --- Django (Main Backend) ---
  django:
    build:
      context: ./backend-django
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend-django:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  # --- FastAPI (Commented out for now) ---
  fastapi:
    build:
      context: ./backend-fastapi
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./backend-fastapi:/app
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    depends_on:
      - redis
      - db

volumes:
  postgres_data: